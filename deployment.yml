apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotstar
  namespace: default
  labels:
    app: hotstar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hotstar
  template:
    metadata:
      labels:
        app: hotstar
    spec:
      containers:
      - name: hotstar
        image: naresh9163/hotstar:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: hotstar-service
  namespace: default
spec:
  selector:
    app: hotstar
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
